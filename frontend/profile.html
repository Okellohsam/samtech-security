<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <script>
    const role = localStorage.getItem("role");
    if (!role) {
      window.location.href = "login.html";
    }
  </script>

  <div class="sidebar">
    <div class="logo">SAMTECH</div>
    <ul id="menuList"></ul>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>My Profile</h2>
      <div class="profile">
        <span id="userName">User</span>
      </div>
    </div>

    <div class="profile-grid">
      <div class="card">
        <h3>Profile Overview</h3>
        <div id="profilePreview">Loading profile...</div>
      </div>

      <div class="card">
        <h3>Edit Profile</h3>
        <form id="profileForm">
          <input type="text" id="name" placeholder="Full Name" required />
          <textarea id="bio" placeholder="Write a short bio" rows="5"></textarea>
          <input type="text" id="skills" placeholder="Skills (comma separated)" />
          <input type="text" id="phone" placeholder="Phone Number" />
          <input type="email" id="contactEmail" placeholder="Contact Email" />
          <input type="text" id="profilePic" placeholder="Profile Image URL" />
          <button type="submit">Update Profile</button>
        </form>
        <p id="profileMessage" class="form-message left"></p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://samtech-security.onrender.com/api";
    const token = localStorage.getItem("token");
    const roleValue = localStorage.getItem("role");
    const userName = localStorage.getItem("name") || "User";

    document.getElementById("userName").textContent = userName;

    const menuList = document.getElementById("menuList");

    if (roleValue === "client") {
      menuList.innerHTML = `
        <li><a href="dashboard-client.html">Dashboard</a></li>
        <li><a href="post-job.html">Post Job</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      `;
    } else {
      menuList.innerHTML = `
        <li><a href="dashboard-expert.html">Dashboard</a></li>
        <li><a href="marketplace.html">Available Jobs</a></li>
        <li><a href="my-applications.html">My Applications</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      `;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    async function loadProfile() {
      const preview = document.getElementById("profilePreview");

      try {
        const res = await fetch(`${API_URL}/users/me`, {
          headers: {
            "Authorization": token
          }
        });

        const user = await res.json();

        if (!res.ok) {
          preview.innerHTML = "<p>Unable to load profile.</p>";
          return;
        }

        localStorage.setItem("name", user.name || userName);
        document.getElementById("userName").textContent = user.name || userName;

        preview.innerHTML = `
          <div class="profile-preview-box">
            <div class="avatar-wrap">
              <img src="${user.profilePic || 'https://via.placeholder.com/120'}" alt="Profile Picture" class="avatar-preview" />
            </div>
            <h4>${user.name || ""}</h4>
            <p><strong>Role:</strong> ${user.role || ""}</p>
            <p>${user.bio || "No bio added yet."}</p>
            <p><strong>Skills:</strong> ${Array.isArray(user.skills) && user.skills.length ? user.skills.join(", ") : "None added"}</p>
            <p><strong>Phone:</strong> ${user.contact?.phone || "Not added"}</p>
            <p><strong>Email:</strong> ${user.contact?.email || user.email || "Not added"}</p>
          </div>
        `;

        document.getElementById("name").value = user.name || "";
        document.getElementById("bio").value = user.bio || "";
        document.getElementById("skills").value = Array.isArray(user.skills) ? user.skills.join(", ") : "";
        document.getElementById("phone").value = user.contact?.phone || "";
        document.getElementById("contactEmail").value = user.contact?.email || user.email || "";
        document.getElementById("profilePic").value = user.profilePic || "";
      } catch (error) {
        preview.innerHTML = "<p>Server connection failed.</p>";
      }
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const messageEl = document.getElementById("profileMessage");
      messageEl.textContent = "";

      const payload = {
        name: document.getElementById("name").value.trim(),
        bio: document.getElementById("bio").value.trim(),
        skills: document.getElementById("skills").value
          .split(",")
          .map(skill => skill.trim())
          .filter(Boolean),
        profilePic: document.getElementById("profilePic").value.trim(),
        contact: {
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("contactEmail").value.trim()
        }
      };

      try {
        const res = await fetch(`${API_URL}/users/me`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          messageEl.textContent = data.msg || "Failed to update profile";
          return;
        }

        localStorage.setItem("name", data.name || payload.name);
        messageEl.style.color = "#7fffb2";
        messageEl.textContent = "Profile updated successfully";
        loadProfile();
      } catch (error) {
        messageEl.textContent = "Unable to connect to server";
      }
    });

    loadProfile();
  </script>
</body>
</html>
