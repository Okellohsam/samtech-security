<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand">SAMTECH SECURITY</div>
    <h2>Create Account</h2>
    <p class="muted">Join as a client or cybersecurity expert</p>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password" required />

      <select id="role" required>
        <option value="">Select Role</option>
        <option value="client">Client</option>
        <option value="expert">Expert</option>
      </select>

      <button type="submit">Create Account</button>
    </form>

    <p id="message" class="form-message"></p>

    <p class="auth-link">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>

<script>
  const messageEl = document.getElementById("message");

  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    messageEl.textContent = "";

    const payload = {
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value.trim(),
      role: document.getElementById("role").value
    };

    try {
      const res = await fetch(`${API_URL}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        messageEl.textContent = data.msg || "Registration failed";
        return;
      }

      messageEl.textContent = data.msg || "Registration successful";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    } catch (error) {
      console.error(error);
      messageEl.textContent = "Server not reachable";
    }
  });
</script>
</body>
</html>
