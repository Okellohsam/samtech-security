<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Applications | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <script>
    const role = localStorage.getItem("role");
    if (!role) {
      window.location.href = "login.html";
    } else if (role !== "expert") {
      window.location.href = "dashboard-client.html";
    }
  </script>

  <div class="sidebar">
    <div class="logo">SAMTECH</div>
    <ul>
      <li><a href="dashboard-expert.html">Dashboard</a></li>
      <li><a href="marketplace.html">Available Jobs</a></li>
      <li><a href="my-applications.html">My Applications</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>My Applications</h2>
      <div class="profile">
        <span id="userName">Expert</span>
      </div>
    </div>

    <div class="card">
      <h3>Application History</h3>
      <p class="muted-left">Track the jobs you have applied for and their current status.</p>
      <div id="applicationsContainer">Loading applications...</div>
    </div>
  </div>

  <script>
    const API_URL = "https://samtech-security.onrender.com/api";
    const token = localStorage.getItem("token");
    const userName = localStorage.getItem("name") || "Expert";

    document.getElementById("userName").textContent = userName;

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    async function loadApplications() {
      const container = document.getElementById("applicationsContainer");

      try {
        const res = await fetch(`${API_URL}/applications/my`, {
          headers: {
            "Authorization": token
          }
        });

        const applications = await res.json();

        if (!Array.isArray(applications)) {
          container.innerHTML = "<p>Unable to load applications.</p>";
          return;
        }

        if (applications.length === 0) {
          container.innerHTML = "<p>You have not applied for any jobs yet.</p>";
          return;
        }

        container.innerHTML = applications.map(app => `
          <div class="job-item">
            <h4>${app.job?.title || "Untitled Job"}</h4>
            <p><strong>Status:</strong> <span class="status-badge status-${app.status}">${app.status}</span></p>
            ${app.status === "accepted" ? `<p class="success-text">You have been accepted. You can now connect with the client.</p>` : ""}
            ${app.status === "rejected" ? `<p class="danger-text">This application was not selected.</p>` : ""}
            ${app.status === "pending" ? `<p class="muted-left">Your application is still under review.</p>` : ""}
          </div>
        `).join("");
      } catch (error) {
        container.innerHTML = "<p>Server connection failed.</p>";
      }
    }

    loadApplications();
  </script>
</body>
</html>
