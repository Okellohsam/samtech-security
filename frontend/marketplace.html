<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Jobs | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<script>
const user = requireAuth();

if (user.role !== "expert") {
  window.location.href = redirectByRole(user.role);
}
</script>

  <script>
    const role = localStorage.getItem("role");
    if (!role) {
      window.location.href = "login.html";
    } else if (role !== "expert") {
      window.location.href = "dashboard-client.html";
    }
  </script>

  <div class="sidebar">
    <div class="logo">SAMTECH</div>
    <ul>
      <li><a href="dashboard-expert.html">Dashboard</a></li>
      <li><a href="marketplace.html">Available Jobs</a></li>
      <li><a href="my-applications.html">My Applications</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Available Jobs</h2>
      <div class="profile">
        <span id="userName">Expert</span>
      </div>
    </div>

    <div class="card">
      <h3>Browse Opportunities</h3>
      <p class="muted-left">Find jobs that match your cybersecurity and tech skills.</p>
      <div id="jobsContainer">Loading jobs...</div>
    </div>
  </div>

  <script>
    const API_URL = "https://samtech-security.onrender.com/api";
    const token = localStorage.getItem("token");
    const userName = localStorage.getItem("name") || "Expert";

    document.getElementById("userName").textContent = userName;

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    async function loadJobs() {
      const container = document.getElementById("jobsContainer");

      try {
        const res = await fetch(`${API_URL}/jobs`);
        const jobs = await res.json();

        if (!Array.isArray(jobs)) {
          container.innerHTML = "<p>Unable to load jobs.</p>";
          return;
        }

        if (jobs.length === 0) {
          container.innerHTML = "<p>No jobs available at the moment.</p>";
          return;
        }

        container.innerHTML = jobs.map(job => `
          <div class="job-item">
            <h4>${job.title}</h4>
            <p>${job.description}</p>
            <p><strong>Skills:</strong> ${Array.isArray(job.skillsRequired) ? job.skillsRequired.join(", ") : (Array.isArray(job.skills) ? job.skills.join(", ") : "Not specified")}</p>
            <button onclick="applyForJob('${job._id}')">Apply Now</button>
          </div>
        `).join("");
      } catch (error) {
        container.innerHTML = "<p>Server connection failed.</p>";
      }
    }

    async function applyForJob(jobId) {
      try {
        const res = await fetch(`${API_URL}/applications`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token
          },
          body: JSON.stringify({ jobId })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.msg || "Application failed");
          return;
        }

        alert("Application submitted successfully");
      } catch (error) {
        alert("Unable to connect to server");
      }
    }

    loadJobs();
  </script>
</body>
</html>
