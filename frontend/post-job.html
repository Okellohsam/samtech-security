<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Job | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <script>
const user = requireAuth();

if (user.role !== "client") {
  window.location.href = redirectByRole(user.role);
}
</script>
  <script>
    const role = localStorage.getItem("role");
    if (!role) {
      window.location.href = "login.html";
    } else if (role !== "client") {
      window.location.href = "dashboard-expert.html";
    }
  </script>

  <div class="sidebar">
    <div class="logo">SAMTECH</div>
    <ul>
      <li><a href="dashboard-client.html">Dashboard</a></li>
      <li><a href="post-job.html">Post Job</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Post a New Job</h2>
      <div class="profile">
        <span id="userName">Client</span>
      </div>
    </div>

    <div class="card form-card">
      <h3>Create Job Listing</h3>
      <p class="muted-left">Describe the task and the skills you need.</p>

      <form id="jobForm">
        <input type="text" id="title" placeholder="Job Title" required />
        <textarea id="description" placeholder="Job Description" rows="6" required></textarea>
        <input type="text" id="skills" placeholder="Required Skills (comma separated)" required />
        <input type="date" id="deadline" />
        <button type="submit">Post Job</button>
      </form>

      <p id="jobMessage" class="form-message left"></p>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api";
    const token = localStorage.getItem("token");
    const userName = localStorage.getItem("name") || "Client";

    document.getElementById("userName").textContent = userName;

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    document.getElementById("jobForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const messageEl = document.getElementById("jobMessage");
      messageEl.textContent = "";

      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const skills = document.getElementById("skills").value
        .split(",")
        .map(skill => skill.trim())
        .filter(Boolean);
      const deadline = document.getElementById("deadline").value;

      try {
        const res = await fetch(`${API_URL}/jobs`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token
          },
          body: JSON.stringify({
            title,
            description,
            skills,
            deadline
          })
        });

        const data = await res.json();

        if (!res.ok) {
          messageEl.textContent = data.msg || "Failed to post job";
          return;
        }

        messageEl.style.color = "#7fffb2";
        messageEl.textContent = "Job posted successfully";
        document.getElementById("jobForm").reset();

        setTimeout(() => {
          window.location.href = "dashboard-client.html";
        }, 1000);
      } catch (error) {
        messageEl.textContent = "Unable to connect to server";
      }
    });
  </script>
</body>
</html>
