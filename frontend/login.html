<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand">SAMTECH SECURITY</div>
    <h2>Welcome Back</h2>
    <p class="muted">Login to continue to your dashboard</p>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="message" class="form-message"></p>

    <p class="auth-link">
      Don’t have an account? <a href="register.html">Create one</a>
    </p>
  </div>

 <script>
  const messageEl = document.getElementById("message");

  function redirectByRole(role) {
    if (role === "admin") {
      window.location.href = "admin.html";
    } else if (role === "expert") {
      window.location.href = "dashboard-expert.html";
    } else {
      window.location.href = "dashboard-client.html";
    }
  }

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    messageEl.textContent = "";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
      const res = await fetch(`${API_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        messageEl.textContent = data.msg || "Login failed";
        return;
      }

      localStorage.clear();
      localStorage.setItem("token", data.token);
      localStorage.setItem("userId", data.user.id);
      localStorage.setItem("role", data.user.role);
      localStorage.setItem("name", data.user.name);
      localStorage.setItem("username", data.user.username || "");

      redirectByRole(data.user.role);
    } catch (error) {
      console.error(error);
      messageEl.textContent = "Unable to connect to server";
    }
  });
</script>
</body>
</html>
