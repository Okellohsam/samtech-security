<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand">SAMTECH SECURITY</div>
    <h2>Welcome Back</h2>
    <p class="muted">Login to continue to your dashboard</p>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="message" class="form-message"></p>

    <p class="auth-link">
      Don’t have an account? <a href="register.html">Create one</a>
    </p>
  </div>

<script src="js/auth.js"></script>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API_URL}/auth/login`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.msg);
    return;
  }

  // RESET STORAGE
  localStorage.clear();

  localStorage.setItem("token", data.token);
  localStorage.setItem("role", data.user.role);
  localStorage.setItem("username", data.user.username);
  localStorage.setItem("name", data.user.name);

  if (data.user.role === "client") {
  window.location.href = "client-dashboard.html";
} else if (data.user.role === "expert") {
  window.location.href = "expert-dashboard.html";
} else if (data.user.role === "admin") {
  window.location.href = "admin-dashboard.html";
}
});
</script>
</body>
</html>
