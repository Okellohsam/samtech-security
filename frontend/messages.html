<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <script>
    const role = localStorage.getItem("role");
    if (!role) window.location.href = "login.html";
  </script>

  <div class="sidebar">
    <div class="logo">SAMTECH</div>
    <ul id="menuList"></ul>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Messages</h2>
      <div class="profile">
        <span id="userName">User</span>
      </div>
    </div>

    <div class="messages-layout">
      <div class="card contacts-panel">
        <h3>Chat Partner</h3>
        <p class="muted-left">Enter a username, not a database ID.</p>
        <input type="text" id="receiverUsername" placeholder="Enter username e.g. samwel1" />
        <button onclick="loadConversation()">Open Chat</button>
      </div>

      <div class="card chat-panel">
        <h3 id="chatTitle">Conversation</h3>
        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input-row">
          <input type="text" id="messageInput" placeholder="Type your message..." />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
const user = requireAuth();
</script>

 <script>
  const token = localStorage.getItem("token");
  const myUsername = localStorage.getItem("username");
  const myName = localStorage.getItem("name") || "User";

  const socket = io(SOCKET_URL);
  socket.emit("register-user", myUsername);

  socket.on("receiveMessage", (msg) => {
    const activeUser = document.getElementById("receiverUsername").value.trim();
    if (msg.from?.username === activeUser || msg.to?.username === activeUser) {
      appendMessage(
        msg.from?.username === myUsername ? "You" : `@${msg.from?.username}`,
        msg.message,
        msg.from?.username === myUsername
      );
    }
  });

  async function loadConversation() {
    const username = document.getElementById("receiverUsername").value.trim();
    const res = await fetch(`${API_URL}/messages/user/${username}`, {
      headers: { "Authorization": token }
    });
    const messages = await res.json();
  }

  function sendMessage() {
    const toUsername = document.getElementById("receiverUsername").value.trim();
    const message = document.getElementById("messageInput").value.trim();

    if (!toUsername || !message) return;

    socket.emit("sendMessage", {
      fromUsername: myUsername,
      toUsername,
      message
    });
  }
</script>
</body>
</html>
