<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | SAMTECH SECURITY</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <script src="js/auth.js"></script>

<script>
const user = requireAuth();

if (user.role !== "admin") {
  window.location.href = redirectByRole(user.role);
}
</script>
  <script>
    const role = localStorage.getItem("role");
    if (!role) {
      window.location.href = "login.html";
    } else if (role !== "admin") {
      if (role === "client") {
        window.location.href = "dashboard-client.html";
      } else {
        window.location.href = "dashboard-expert.html";
      }
    }
  </script>

  <div class="sidebar">
    <div class="logo">SAMTECH ADMIN</div>
    <ul>
      <li><a href="admin.html">Dashboard</a></li>
      <li><a href="#usersSection">Users</a></li>
      <li><a href="#jobsSection">Jobs</a></li>
      <li><a href="#applicationsSection">Applications</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Admin Dashboard</h2>
      <div class="profile">
        <span id="adminName">Admin</span>
      </div>
    </div>

    <div class="stats">
      <div class="card">
        <h3>Total Users</h3>
        <p id="usersCount">0</p>
      </div>
      <div class="card">
        <h3>Total Jobs</h3>
        <p id="jobsCount">0</p>
      </div>
      <div class="card">
        <h3>Total Applications</h3>
        <p id="applicationsCount">0</p>
      </div>
    </div>

    <div class="card" id="usersSection">
      <h3>Manage Users</h3>
      <div id="usersTable">Loading users...</div>
    </div>

    <div class="card" id="jobsSection">
      <h3>Manage Jobs</h3>
      <div id="jobsTable">Loading jobs...</div>
    </div>

    <div class="card" id="applicationsSection">
      <h3>Manage Applications</h3>
      <div id="applicationsTable">Loading applications...</div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api";
    const token = localStorage.getItem("token");
    const adminName = localStorage.getItem("name") || "Admin";

    document.getElementById("adminName").textContent = adminName;

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    async function loadAdminData() {
      await Promise.all([
        loadUsers(),
        loadJobs(),
        loadApplications()
      ]);
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/admin/users`, {
          headers: {
            "Authorization": token
          }
        });

        const users = await res.json();
        const container = document.getElementById("usersTable");

        if (!Array.isArray(users)) {
          container.innerHTML = "<p>Unable to load users.</p>";
          return;
        }

        document.getElementById("usersCount").textContent = users.length;

        container.innerHTML = `
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${users.map(user => `
                  <tr>
                    <td>${user.name || ""}</td>
                    <td>${user.email || ""}</td>
                    <td>${user.role || ""}</td>
                    <td>
                      <button class="danger-btn" onclick="deleteUser('${user._id}')">Delete</button>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        document.getElementById("usersTable").innerHTML = "<p>Server connection failed.</p>";
      }
    }

    async function loadJobs() {
      try {
        const res = await fetch(`${API_URL}/admin/jobs`, {
          headers: {
            "Authorization": token
          }
        });

        const jobs = await res.json();
        const container = document.getElementById("jobsTable");

        if (!Array.isArray(jobs)) {
          container.innerHTML = "<p>Unable to load jobs.</p>";
          return;
        }

        document.getElementById("jobsCount").textContent = jobs.length;

        container.innerHTML = `
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Client</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${jobs.map(job => `
                  <tr>
                    <td>${job.title || ""}</td>
                    <td>${job.client?.name || "Unknown"}</td>
                    <td>
                      <button class="danger-btn" onclick="deleteJob('${job._id}')">Delete</button>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        document.getElementById("jobsTable").innerHTML = "<p>Server connection failed.</p>";
      }
    }

    async function loadApplications() {
      try {
        const res = await fetch(`${API_URL}/admin/applications`, {
          headers: {
            "Authorization": token
          }
        });

        const applications = await res.json();
        const container = document.getElementById("applicationsTable");

        if (!Array.isArray(applications)) {
          container.innerHTML = "<p>Unable to load applications.</p>";
          return;
        }

        document.getElementById("applicationsCount").textContent = applications.length;

        container.innerHTML = `
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Job</th>
                  <th>Expert</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${applications.map(app => `
                  <tr>
                    <td>${app.job?.title || "Untitled Job"}</td>
                    <td>${app.expert?.name || "Unknown"}</td>
                    <td><span class="status-badge status-${app.status}">${app.status}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        document.getElementById("applicationsTable").innerHTML = "<p>Server connection failed.</p>";
      }
    }

    async function deleteUser(userId) {
      if (!confirm("Delete this user?")) return;

      try {
        const res = await fetch(`${API_URL}/admin/users/${userId}`, {
          method: "DELETE",
          headers: {
            "Authorization": token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.msg || "Failed to delete user");
          return;
        }

        loadUsers();
      } catch (error) {
        alert("Server connection failed");
      }
    }

    async function deleteJob(jobId) {
      if (!confirm("Delete this job?")) return;

      try {
        const res = await fetch(`${API_URL}/admin/jobs/${jobId}`, {
          method: "DELETE",
          headers: {
            "Authorization": token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.msg || "Failed to delete job");
          return;
        }

        loadJobs();
      } catch (error) {
        alert("Server connection failed");
      }
    }

    loadAdminData();
  </script>
</body>
</html>
